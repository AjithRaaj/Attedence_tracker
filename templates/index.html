<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracking System</title>

    <!-- ✅ CSS (Flask static correct way) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Attendance Tracking System</h1>

        <div class="quote">
            “Success starts with discipline.”
        </div>

        <!-- Employee ID -->
        <input type="text" id="emp_id" placeholder="Employee ID">

        <button type="button" onclick="loadEmployee()">
            Load Employee
        </button>

        <!-- Employee Details -->
        <input type="text" id="name" placeholder="Employee Name" readonly>
        <input type="text" id="phone" placeholder="Phone Number" readonly>

        <input type="text" value="Chennai Office" readonly>

        <!-- OTP -->
        <input type="text" id="otp" placeholder="Enter OTP">

        <!-- Buttons -->
        <div class="buttons">

            <button type="button" class="in-btn" onclick="markAttendance('in')">
                Punch IN
            </button>

            <button type="button" class="out-btn" onclick="markAttendance('out')">
                Punch OUT
            </button>

        </div>

        <!-- Status -->
        <div id="status" style="margin-top:15px; color:#333; font-size:14px;"></div>

        <!-- Footer -->
        <div class="footer">
            Created By Ajith MIS
        </div>

    </div>

    <!-- ✅ JS (IMPORTANT - must be bottom) -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
