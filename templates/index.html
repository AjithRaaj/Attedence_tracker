<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Attendance Tracking System</title>

    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <div class="top-icon">
            📍
        </div>

        <h1>
            Attendance Tracker 🚀
        </h1>

        <div class="quote">
            “Success starts with discipline & consistency 💯”
        </div>

        <!-- EMPLOYEE ID -->
        <input
            type="text"
            id="emp_id"
            placeholder="👤 Enter Employee ID">

        <!-- LOAD BUTTON -->
        <button
            type="button"
            onclick="loadEmployee()">

            🔍 Load Employee

        </button>

        <!-- EMPLOYEE DETAILS -->
        <input
            type="text"
            id="name"
            placeholder="👨 Employee Name"
            readonly>

        <input
            type="text"
            id="phone"
            placeholder="📞 Phone Number"
            readonly>

        <!-- OFFICE -->
        <input
            type="text"
            value="🏢 Chennai Office"
            readonly>

        <!-- OTP -->
        <input
            type="text"
            id="otp"
            placeholder="🔐 Enter OTP">

        <!-- BUTTON GROUP -->
        <div class="buttons">

            <!-- PUNCH IN -->
            <button
                type="button"
                class="in-btn"
                onclick="markAttendance('in')">

                ✅ Punch IN

            </button>

            <!-- PUNCH OUT -->
            <button
                type="button"
                class="out-btn"
                onclick="markAttendance('out')">

                ❌ Punch OUT

            </button>

        </div>

        <!-- STATUS -->
        <div id="result">

            ⏳ Waiting for action...

        </div>

        <!-- FOOTER -->
        <div class="footer">

            Made with ❤️ by Ajith MIS

        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
